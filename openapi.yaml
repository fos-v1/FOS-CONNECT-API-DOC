openapi: 3.0.3
info:
  title: Air Export Shipment API
  version: 1.0.0
  description: API for creating Air shipment records.

servers:
  - url: http://test.freightoscope.com
    description: Test Freightoscope environment

paths:
  /CreateShipment:
    post:
      summary: Create a new air shipment
      description: >
        Creates an air shipment in Freightoscope.
        Authentication is provided via query parameters in the request URL.
      operationId: createShipment
      parameters:
        - in: query
          name: UserName
          required: true
          schema:
            type: string
          description: Application user name.
          example: FOS_Connect
        - in: query
          name: Password
          required: true
          schema:
            type: string
            format: password
          description: Application password.
          example: Zhypility@123
        - in: query
          name: CompanyId
          required: true
          schema:
            type: integer
          description: Numeric company identifier.
          example: 20263
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Shipment'
      responses:
        '201':
          description: Shipment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Shipment'

components:
  schemas:
    Shipment:
      type: object
      properties:
        General:
          type: object
          properties:
            ShipmentMode:
              type: string
              description: Mode of shipment
              example: Air
            ShipmentDirection:
              type: string
              description: Direction of shipment
              example: Export
            ShipmentType:
              type: string
              example: Branch
            ReferenceNumber:
              type: string
              nullable: true
            IsDomestic:
              type: boolean
            ShipmentNumber:
              type: string
            AWB_Type:
              type: string
              description: AWB type (Master/House)
            ShipmentDate:
              type: string
              description: Shipment date (DD/MM/YYYY)
              example: "19/01/2026"
            DeliveryDate:
              type: string
              description: Delivery date (DD/MM/YYYY)
              example: "19/01/2026"
            Carrier:
              type: object
              properties:
                Code:
                  type: string
                  example: BA
                Name:
                  type: string
                  example: British Airways
              required:
                - Code
                - Name
            MAWB:
              type: string
              description: Master Air Waybill number
            BL:
              type: string
              nullable: true
            CMRNo:
              type: string
              nullable: true
            ShipmentModeType:
              type: string
              nullable: true
            ServiceType:
              type: string
              example: Express
            JobType:
              type: string
              example: Direct
            JobNumber:
              type: string
          required:
            - ShipmentMode
            - ShipmentDirection
            - ShipmentType
            - IsDomestic
            - ShipmentNumber
            - AWB_Type
            - ShipmentDate
            - DeliveryDate
            - Carrier
            - MAWB
            - ServiceType
            - JobType
            - JobNumber

        Parties:
          type: object
          properties:
            List:
              type: array
              items:
                type: object
                properties:
                  Name:
                    type: string
                  PartyType:
                    type: string
                    example: Consignee
                  Address1:
                    type: string
                  Address2:
                    type: string
                  Address3:
                    type: string
                  City:
                    type: string
                  Country:
                    type: string
                  Zipcode:
                    type: string
                  State:
                    type: string
                  Phone:
                    type: string
                  Email:
                    type: string
                    format: email
                required:
                  - Name
                  - PartyType
                  - City
                  - Country

        Routing:
          type: object
          properties:
            MovementType:
              type: string
              example: Door to Door
            IncoTerm:
              type: string
              example: EXW
            PickupAddress:
              type: string
            PlaceOfReceipt:
              type: string
            PlaceOfDelivery:
              type: string
            FinalDestination:
              type: string
              nullable: true
            DeliveryAddress:
              type: string
            TransitTimeString:
              type: string
              description: Transit time in HH:MM:SS
            ServiceTerm:
              type: string
              nullable: true
            Flights:
              type: array
              items:
                type: object
                properties:
                  FromAirport:
                    type: string
                    example: BOM
                  ToAirport:
                    type: string
                    example: BKK
                  Carrier:
                    type: object
                    properties:
                      Code:
                        type: string
                        example: "6E"
                      Name:
                        type: string
                        example: INDIGO
                    required:
                      - Code
                      - Name
                  FlightNo:
                    type: string
                  ETD:
                    type: string
                    description: Estimated time of departure (DD/MM/YYYY HH:MM:SS)
                    example: "21/01/2026 00:07:00"
                  ETA:
                    type: string
                    description: Estimated time of arrival (DD/MM/YYYY HH:MM:SS)
                    example: "21/01/2026 00:11:00"
                  ActualDepartureDate:
                    type: string
                    example: "21/01/2026 00:08:00"
                  ActualArrivalDate:
                    type: string
                    example: "21/01/2026 00:12:00"
            Voyages:
              type: array
              items:
                type: object
            Carriages:
              type: array
              items:
                type: object

        Goods:
          type: object
          properties:
            List:
              type: array
              items:
                type: object
                properties:
                  ContainerNo:
                    type: string
                  Pcs:
                    type: integer
                    example: 10
                  PackageType:
                    type: string
                    example: Box
                  CommodityType:
                    type: string
                    example: General
                  RateClass:
                    type: string
                    example: "M - Minimum Charge"
                  GrossWeight:
                    type: number
                    format: float
                    example: 50
                  GrossWeightUOM:
                    type: string
                    example: Kgs
                  ChargeableWeight:
                    type: number
                    format: float
                    example: 50
                  ChargeableWeightUOM:
                    type: string
                    example: Kgs
                  Volume:
                    type: number
                    format: float
                    example: 3.5
                  VolumeUOM:
                    type: string
                    example: CBM
                  SLAC:
                    type: integer
                    example: 57
                  CommodityItemNumber:
                    type: string
                    example: "8793"
                  Commodity:
                    type: string
                    example: Food Stuff
                  TruckNumber:
                    type: string
                  HSCodes:
                    type: array
                    items:
                      type: integer
                    example: [932192]
                  DimensionsUOM:
                    type: string
                    example: CM
                  Dimensions:
                    type: array
                    items:
                      type: object
                      properties:
                        UOM:
                          type: string
                          example: CM
                        Pcs:
                          type: integer
                          example: 10
                        Length:
                          type: number
                          example: 10
                        Width:
                          type: number
                          example: 10
                        Height:
                          type: number
                          example: 10
                        WeightOfOnePiece:
                          type: number
                          example: 10
                  MarksAndNumbers:
                    type: string
                    example: "Insurance: Yes | Certificate Of Origin: Yes | Commercial Invoice: Yes"
                  GoodsDescription:
                    type: string
                    example: Food Stuff

        Handling:
          type: object
          properties:
            SCI:
              type: string
              example: DG
            SpecialHandlingCode:
              type: array
              items:
                type: string
              example: ["ICE", "PIL", "CAO"]
            HandlingInformation:
              type: string
              example: "DANGEROUS GOODS AS PER ATTACHED DGD. CARGO AIRCRAFT ONLY. HANDLE WITH CARE. KEEP AWAY FROM HEAT SOURCES."
            OtherServiceInformation:
              type: string
              example: "OSI/YY SHIPPER DECLARES DG IN COMPLIANCE WITH IATA DGR. TEMPERATURE MAINTAIN 5-25 DEG C."
            OptionalShippingInformation:
              type: string
              example: "CARGO REQUIRES PRIOR ARRANGEMENT. ADVANCE NOTIFICATION REQUIRED BEFORE ARRIVAL."

        documentList:
          type: array
          items:
            type: object
            properties:
              DocumentName:
                type: string
              DocumentLink:
                type: string
                format: uri
            required:
              - DocumentName
              - DocumentLink

      required:
        - General
        - Parties
        - Routing
        - Goods
        - Handling
