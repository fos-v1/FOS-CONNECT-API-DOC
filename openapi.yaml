  /get/shipment:
    get:
      summary: Get shared shipment details
      description: >
        Fetches shipment details shared with the company.
      operationId: getSharedShipment
      parameters:
        - in: query
          name: UserName
          required: true
          schema:
            type: string
          description: Application user name.
          example: FOS_Connect
        - in: query
          name: Password
          required: true
          schema:
            type: string
            format: password
          description: Application password.
          example: Zhypility@123
        - in: query
          name: CompanyId
          required: true
          schema:
            type: integer
          description: Numeric company identifier.
          example: 20263
      responses:
        '200':
          description: Shipment created Successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Shipment created Successfully
                  Code:
                    type: integer
                    example: 200
                required:
                  - Message
                  - Code

  /get/tracking:
    get:
      summary: Get Tracking details of the shipment
      description: Fetches tracking details for a shared shipment .Authentication is provided via query parameters in the request URL.
      operationId: getSharedTracking
      parameters:
        - in: query
          name: UserName
          required: true
          schema:
            type: string
          description: Application user name.
          example: FOS_Connect
        - in: query
          name: Password
          required: true
          schema:
            type: string
            format: password
          description: Application password.
          example: Zhypility@123
        - in: query
          name: CompanyId
          required: true
          schema:
            type: integer
          description: Numeric company identifier.
          example: 20263
        - in: query
          name: JobNumber
          required: true
          schema:
            type: string
          Description: Job Number of Shipment Shared by the Sender
          example: SHPT-9321   
      responses:
        '200':
          description: Tracking data fetched succsessfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tracking'
        '400':
          description: Shipment creation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Shipment creation failed
                  Code:
                    type: integer
                    example: 400
                required:
                  - Message
                  - Code

  /post/tracking:
    post:
      summary: Post Tracking details of the shipment
      description: es tracking details for a shared shipment .Authentication is provided via query parameters in the request URL.
      operationId: postSharedTracking
      parameters:
        - in: query
          name: UserName
          required: true
          schema:
            type: string
          description: Application user name.
          example: FOS_Connect
        - in: query
          name: Password
          required: true
          schema:
            type: string
            format: password
          description: Application password.
          example: Zhypility@123
        - in: query
          name: CompanyId
          required: true
          schema:
            type: integer
          description: Numeric company identifier.
          example: 20263
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Tracking'    
      responses:
        '200':
          description: Tracking data fetched succsessfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Tracking Event created successfully

        '400':
          description: Shipment creation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Tracking Event creation failed
                  Code:
                    type: integer
                    example: 400
                required:
                  - Message
                  - Code
  /post/shipment/document:
    post:
      summary: Upload document for shipment
      description: >
        Uploads a document for a specific shipment.
        Authentication is provided via query parameters.
      operationId: uploadShipmentDocument

      parameters:
        - in: query
          name: UserName
          required: true
          schema:
            type: string

        - in: query
          name: Password
          required: true
          schema:
            type: string
            format: password

        - in: query
          name: CompanyId
          required: true
          schema:
            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShipmentDocument'

      responses:
        '200':
          description: Document uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                  Code:
                    type: integer
  /get/shipment/document:
    get:
      summary: Get documents for shipment
      description: >
        Fetches all documents linked to a specific shipment.
      operationId: getShipmentDocuments

      parameters:
        - in: query
          name: UserName
          required: true
          schema:
            type: string

        - in: query
          name: Password
          required: true
          schema:
            type: string
            format: password

        - in: query
          name: CompanyId
          required: true
          schema:
            type: integer

        - in: query
          name: ShipmentNumber
          required: true
          schema:
            type: string

      responses:
        '200':
          description: Documents fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShipmentDocument'

components:
  schemas:
    Shipment:
      type: object
      properties:
        General:
          type: object
          properties:
            ShipmentMode:
              type: string
              description: Mode of shipment
              example: Air
            ShipmentDirection:
              type: string
              description: Direction of shipment
              example: Export
            ShipmentType:
              type: string
              example: Branch
            ReferenceNumber:
              type: string
              nullable: true
            IsDomestic:
              type: boolean
            ShipmentNumber:
              type: string
            AWB_Type:
              type: string
              description: AWB type (Master/House)
            ShipmentDate:
              type: string
              description: Shipment date (DD/MM/YYYY)
              example: "19/01/2026"
            DeliveryDate:
              type: string
              description: Delivery date (DD/MM/YYYY)
              example: "19/01/2026"
            Carrier:
              type: object
              properties:
                Code:
                  type: string
                  example: BA
                Name:
                  type: string
                  example: British Airways
              required:
                - Code
                - Name
            MAWB:
              type: string
              description: Master Air Waybill number
            BL:
              type: string
              nullable: true
            CMRNo:
              type: string
              nullable: true
            ShipmentModeType:
              type: string
              nullable: true
            ServiceType:
              type: string
              example: Express
            JobType:
              type: string
              example: Direct
            JobNumber:
              type: string
          required:
            - ShipmentMode
            - ShipmentDirection
            - ShipmentType
            - IsDomestic
            - ShipmentNumber
            - AWB_Type
            - ShipmentDate
            - DeliveryDate
            - Carrier
            - MAWB
            - ServiceType
            - JobType
            - JobNumber

        Parties:
          type: object
          properties:
            List:
              type: array
              items:
                type: object
                properties:
                  Name:
                    type: string
                  PartyType:
                    type: string
                    example: Consignee
                  Address1:
                    type: string
                  Address2:
                    type: string
                  Address3:
                    type: string
                  City:
                    type: string
                  Country:
                    type: string
                  Zipcode:
                    type: string
                  State:
                    type: string
                  Phone:
                    type: string
                  Email:
                    type: string
                    format: email
                required:
                  - Name
                  - PartyType
                  - City
                  - Country

        Routing:
          type: object
          properties:
            MovementType:
              type: string
              example: Door to Door
            IncoTerm:
              type: string
              example: EXW
            PickupAddress:
              type: string
            PlaceOfReceipt:
              type: string
            PlaceOfDelivery:
              type: string
            FinalDestination:
              type: string
              nullable: true
            DeliveryAddress:
              type: string
            TransitTimeString:
              type: string
              description: Transit time in HH:MM:SS
            ServiceTerm:
              type: string
              nullable: true
            Flights:
              type: array
              items:
                type: object
                properties:
                  FromAirport:
                    type: string
                    example: BOM
                  ToAirport:
                    type: string
                    example: BKK
                  Carrier:
                    type: object
                    properties:
                      Code:
                        type: string
                        example: "6E"
                      Name:
                        type: string
                        example: INDIGO
                    required:
                      - Code
                      - Name
                  FlightNo:
                    type: string
                  ETD:
                    type: string
                    description: Estimated time of departure (DD/MM/YYYY HH:MM:SS)
                    example: "21/01/2026 00:07:00"
                  ETA:
                    type: string
                    description: Estimated time of arrival (DD/MM/YYYY HH:MM:SS)
                    example: "21/01/2026 00:11:00"
                  ActualDepartureDate:
                    type: string
                    example: "21/01/2026 00:08:00"
                  ActualArrivalDate:
                    type: string
                    example: "21/01/2026 00:12:00"
            Voyages:
              type: array
              description: Vessel voyage details (used for sea shipments).
              items:
                type: object
                properties:
                  VoyageNo:
                    type: string
                    example: "1369-027W"
                  Carrier:
                    type: object
                    properties:
                      Code:
                        type: string
                        example: EVLG
                      Name:
                        type: string
                        example: EVERGREEN
                    required:
                      - Code
                      - Name
                  DeparturePort:
                    type: string
                    example: INNSA
                  ArrivalPort:
                    type: string
                    example: AEDXB
                  VesselName:
                    type: string
                    example: EVER GIFTED
                  VesselFlag:
                    type: string
                    example: IND
                  IMO:
                    type: string
                    example: "IMO 93219466"
                  LloydsNumber:
                    type: string
                    example: "LR 1234567"
                  ETD:
                    type: string
                    description: Estimated time of departure (DD/MM/YYYY HH:MM:SS)
                    example: "21/01/2026 00:07:00"
                  ETA:
                    type: string
                    description: Estimated time of arrival (DD/MM/YYYY HH:MM:SS)
                    example: "25/01/2026 00:11:00"
                  ActualDepartureDate:
                    type: string
                    example: "22/01/2026 00:08:00"
                  ActualArrivalDate:
                    type: string
                    example: "26/01/2026 00:12:00"
            Carriages:
              type: array
              description: Inland leg / trucking details (used for inland shipments).
              items:
                type: object
                properties:
                  TruckNumber:
                    type: string
                    example: "MH 03 DQ 6152"
                  Transporter:
                    type: object
                    properties:
                      Code:
                        type: string
                        example: FTS
                      Name:
                        type: string
                        example: "Fastrack Transporters"
                    required:
                      - Code
                      - Name
                  DeparturePort:
                    type: string
                    example: MUMCHE
                  ArrivalPort:
                    type: string
                    example: INPNQ
                  IMO:
                    type: string
                    example: "IMO 93219466"
                  LloydsNumber:
                    type: string
                    example: "LR 1234567"
                  ETD:
                    type: string
                    description: Estimated time of departure (DD/MM/YYYY HH:MM:SS)
                    example: "21/01/2026 00:07:00"
                  ETA:
                    type: string
                    description: Estimated time of arrival (DD/MM/YYYY HH:MM:SS)
                    example: "25/01/2026 00:11:00"
                  ActualDepartureDate:
                    type: string
                    example: "22/01/2026 00:08:00"
                  ActualArrivalDate:
                    type: string
                    example: "26/01/2026 00:12:00"

        Goods:
          type: object
          properties:
            List:
              type: array
              items:
                type: object
                properties:
                  ContainerNo:
                    type: string
                  Pcs:
                    type: integer
                    example: 10
                  PackageType:
                    type: string
                    example: Box
                  CommodityType:
                    type: string
                    example: General
                  RateClass:
                    type: string
                    example: "M - Minimum Charge"
                  GrossWeight:
                    type: number
                    format: float
                    example: 50
                  GrossWeightUOM:
                    type: string
                    example: Kgs
                  ChargeableWeight:
                    type: number
                    format: float
                    example: 50
                  ChargeableWeightUOM:
                    type: string
                    example: Kgs
                  Volume:
                    type: number
                    format: float
                    example: 3.5
                  VolumeUOM:
                    type: string
                    example: CBM
                  SLAC:
                    type: integer
                    example: 57
                  CommodityItemNumber:
                    type: string
                    example: "8793"
                  Commodity:
                    type: string
                    example: Food Stuff
                  TruckNumber:
                    type: string
                  HSCodes:
                    type: array
                    items:
                      type: integer
                    example: [932192]
                  DimensionsUOM:
                    type: string
                    example: CM
                  Dimensions:
                    type: array
                    items:
                      type: object
                      properties:
                        UOM:
                          type: string
                          example: CM
                        Pcs:
                          type: integer
                          example: 10
                        Length:
                          type: number
                          example: 10
                        Width:
                          type: number
                          example: 10
                        Height:
                          type: number
                          example: 10
                        WeightOfOnePiece:
                          type: number
                          example: 10
                  MarksAndNumbers:
                    type: string
                    example: "Insurance: Yes | Certificate Of Origin: Yes | Commercial Invoice: Yes"
                  GoodsDescription:
                    type: string
                    example: Food Stuff

        ContainerDetails:
          type: object
          description: Container-level information (primarily for sea shipments).
          properties:
            List:
              type: array
              items:
                type: object
                properties:
                  ContainerNo:
                    type: string
                    example: MAEU1482334
                  ContainerSize:
                    type: string
                    example: "20 DRY"
                  CarrierSeal:
                    type: string
                    example: Custom Seal
                  CustomSeal:
                    type: string
                    example: IN-CUS-458921
                  ShipperOwned:
                    type: boolean
                    example: true
                  EmptyPickupType:
                    type: integer
                    example: 0
                  EmptyPickupPort:
                    type: string
                    example: AEDXB
                  EmptyPickupTerminal:
                    type: string
                    nullable: true
                  EmptyPickupInstruction:
                    type: string
                    example: >
                      Collect empty container from SEDXB Yard, Gate No. 3. Driver to carry EIR and booking reference.

        Handling:
          type: object
          properties:
            SCI:
              type: string
              example: DG
            SpecialHandlingCode:
              type: array
              items:
                type: string
              example: ["ICE", "PIL", "CAO"]
            HandlingInformation:
              type: string
              example: "DANGEROUS GOODS AS PER ATTACHED DGD. CARGO AIRCRAFT ONLY. HANDLE WITH CARE. KEEP AWAY FROM HEAT SOURCES."
            OtherServiceInformation:
              type: string
              example: "OSI/YY SHIPPER DECLARES DG IN COMPLIANCE WITH IATA DGR. TEMPERATURE MAINTAIN 5-25 DEG C."
            OptionalShippingInformation:
              type: string
              example: "CARGO REQUIRES PRIOR ARRANGEMENT. ADVANCE NOTIFICATION REQUIRED BEFORE ARRIVAL."

        TruckDetails:
          type: object
          description: Truck and driver details (used for inland shipments).
          properties:
            List:
              type: array
              items:
                type: object
                properties:
                  Transporter:
                    type: object
                    properties:
                      Code:
                        type: string
                        example: UNITRNSP
                      Name:
                        type: string
                        example: "Universal Transporters"
                    required:
                      - Code
                      - Name
                  TruckNo:
                    type: string
                    example: NL-TX-8745
                  Driver:
                    type: string
                    example: "Johan Van Dijk"
                  ContactNo:
                    type: string
                    example: "+31 6 1234 5678"
                  LicenseNo:
                    type: string
                    example: NL-DL-987654321

        documentList:
          type: array
          items:
            type: object
            properties:
              DocumentName:
                type: string
              DocumentLink:
                type: string
                format: uri
            required:
              - DocumentName
              - DocumentLink

      required:
        - General
        - Parties
        - Routing
        - Goods

    Tracking:
      type: object
      properties:
        SenderShipmentId:
          type: string
          example: ID-9321

        SenderJobNo:
          type: string
          example: RS-0021

        ShipmentNumber:
          type: string
          example: SHPT9321

        Event:
          type: object
          properties:
            Code:
              type: string
              example: TRS
            Description:
              type: string
              example: Tracking Request Sent

        EventDateTime:
          type: string
          description: Event timestamp in ISO format
          example: 2026-12-02T00:10:00
          format: date-time

        Status:
          type: string
          example: Planned

        Location:
          type: string
          example: BOM

        Pcs:
          type: integer
          example: 5

        Weight:
          type: number
          format: float
          example: 500

        WeightUOM:
          type: string
          example: Kg

        ContainerNumber:
          type: string
          example: BA836254

        documentList:
          type: array
          items:
            type: object
            properties:
              DocumentName:
                type: string
                example: POD
              DocumentLink:
                type: string
                format: uri
    ShipmentDocument:
      type: object
      required:
        - ShipmentNumber
        - DocumentName
        - DocumentLink
      properties:
        ShipmentNumber:
          type: string
          example: SHPT-9321

        DocumentName:
          type: string
          example: OTHERS

        DocumentLink:
          type: string
          format: uri
          example: https://fileserve.blob.core.windows.net/upload/fos/2339/4347-4328-9626-1664-4065-6614-4578-4819-4539-4853-4436/MBL_final_RAMOE_25100005.pdf
