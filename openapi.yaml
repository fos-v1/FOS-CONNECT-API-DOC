openapi: 3.0.3
info:
  title: FOS CONNECT API DOCUMENTATION
  version: 1.0.0
  description: FOS CONNECT API 

servers:
  - url: http://test.freightoscope.com
    description: Test Freightoscope environment

paths:
  /post/shipment/air:
    post:
      summary: Create a new air shipment
      description: >
        Creates an air shipment in Freightoscope.
        Authentication is provided via query parameters in the request URL.
      operationId: createShipment
      parameters:
        - in: query
          name: UserName
          required: true
          schema:
            type: string
          description: Application user name.
          example: FOS_Connect
        - in: query
          name: Password
          required: true
          schema:
            type: string
            format: password
          description: Application password.
          example: Zhypility@123
        - in: query
          name: CompanyId
          required: true
          schema:
            type: integer
          description: Numeric company identifier.
          example: 20263
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Shipment'
      responses:
        '200':
          description: Shipment created Successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Shipment created Successfully
                  Code:
                    type: integer
                    example: 200
                required:
                  - Message
                  - Code
        '400':
          description: Shipment creation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Shipment creation failed
                  Code:
                    type: integer
                    example: 400
                required:
                  - Message
                  - Code

